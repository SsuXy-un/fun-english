<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- 猫头鹰身体 -->
  <ellipse cx="256" cy="280" rx="120" ry="140" fill="#8B6914"/>

  <!-- 猫头鹰肚子 -->
  <ellipse cx="256" cy="310" rx="80" ry="100" fill="#D4A017"/>

  <!-- 左眼 -->
  <circle cx="210" cy="230" r="45" fill="white"/>
  <circle cx="210" cy="230" r="30" fill="#333"/>
  <circle cx="200" cy="220" r="10" fill="white"/>

  <!-- 右眼 -->
  <circle cx="302" cy="230" r="45" fill="white"/>
  <circle cx="302" cy="230" r="30" fill="#333"/>
  <circle cx="292" cy="220" r="10" fill="white"/>

  <!-- 嘴巴 -->
  <polygon points="256,270 240,290 272,290" fill="#FF6B35"/>

  <!-- 左耳 -->
  <polygon points="170,180 150,120 200,160" fill="#8B6914"/>

  <!-- 右耳 -->
  <polygon points="342,180 362,120 312,160" fill="#8B6914"/>

  <!-- 左翅膀 -->
  <ellipse cx="140" cy="300" rx="40" ry="80" fill="#8B6914" transform="rotate(-15 140 300)"/>

  <!-- 右翅膀 -->
  <ellipse cx="372" cy="300" rx="40" ry="80" fill="#8B6914" transform="rotate(15 372 300)"/>

  <!-- 书本 -->
  <rect x="200" y="380" width="112" height="80" rx="5" fill="#FF6B35"/>
  <rect x="205" y="385" width="102" height="70" rx="3" fill="#FFD700"/>
  <line x1="256" y1="385" x2="256" y2="455" stroke="#FF6B35" stroke-width="3"/>

  <!-- 文字 -->
  <text x="256" y="100" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">ABC</text>
</svg>
